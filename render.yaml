services:
  - type: web
    name: bro-bot
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_PUBLIC_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: VOTE_CHANNEL_ID
        sync: false
      - key: ENABLE_WELCOME_MESSAGES
        value: "false"
      - key: WELCOME_CHANNEL_ID
        sync: false
      - key: MUSIC_VOICE_CHANNEL_ID
        sync: false
      - key: MUSIC_FILE_PATH
        sync: false
      - key: MUSIC_VOLUME
        value: "0.5"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
